name: Release

on:
  push:
    tags:
      - "v*"

permissions: write-all

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install gcc-aarch64-linux-gnu
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --all-features --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          tar czf zerostack-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release zerostack

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: zerostack-${{ matrix.target }}.tar.gz
          asset_name: zerostack-${{ matrix.target }}.tar.gz
          tag: ${{ github.ref }}
          overwrite: true

  build-static:
    name: ${{ matrix.target }}-static
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build static binary (${{ matrix.target }})
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename and package
        run: |
          cp target/${{ matrix.target }}/release/zerostack zerostack-${{ matrix.target }}
          tar czf zerostack-${{ matrix.target }}.tar.gz zerostack-${{ matrix.target }}

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: zerostack-${{ matrix.target }}.tar.gz
          asset_name: zerostack-${{ matrix.target }}.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
